<!DOCTYPE html>
<html>
<head>
    <title>House Price Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #00c6ff;
        }

        .result {
            margin-top: 15px;
            text-align: center;
            font-size: 18px;
            color: green;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🏠 House Price Prediction</h2>

    <form action="/predict" method="post">
        {% for col in columns %}
            <label>{{ col }}</label>
            <input type="number" step="any" name="{{col}}" placeholder="Enter {{col}}">
        {% endfor %}

        <button type="submit">Predict Price</button>
    </form>

    {% if prediction %}
        <div class="result">
            💰 Estimated Price: {{ prediction }}
        </div>
    {% endif %}
</div>

</body>
</html>
